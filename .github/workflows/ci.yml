name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build inform6 compiler
        run: make -C Inform6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: langserver/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: langserver

      - name: Type check
        run: npm run check
        working-directory: langserver

      - name: Run tests
        run: npm test
        working-directory: langserver
