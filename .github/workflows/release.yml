name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-compiler:
    name: Build compiler (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            binary: inform6
            asset: inform6-linux-x64
            cc: gcc
            cflags: ""

          - os: macos-latest   # cross-compile x86_64 on Apple Silicon runner
            label: macos-x64
            binary: inform6
            asset: inform6-macos-x64
            cc: clang
            cflags: "-arch x86_64"

          - os: macos-latest   # Apple Silicon (M-series)
            label: macos-arm64
            binary: inform6
            asset: inform6-macos-arm64
            cc: clang
            cflags: "-arch arm64"

          - os: windows-latest
            label: windows-x64
            binary: inform6.exe
            asset: inform6-windows-x64.exe
            cc: gcc
            cflags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up MinGW (Windows)
        if: runner.os == 'Windows'
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64

      - name: Build
        run: make -C Inform6 CC=${{ matrix.cc }} CFLAGS="${{ matrix.cflags }}"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: Inform6/${{ matrix.binary }}
          if-no-files-found: error

  build-vsix:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: langserver/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: langserver

      - name: Package VSIX
        run: npm run package-vsix
        working-directory: langserver

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: inform6-lsp-vsix
          path: langserver/*.vsix
          if-no-files-found: error

  build-source:
    name: Package Inform6 source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create archives
        run: |
          tar czf inform6-src.tar.gz Inform6/
          zip -r inform6-src.zip Inform6/

      - name: Upload source archives
        uses: actions/upload-artifact@v4
        with:
          name: inform6-src
          path: |
            inform6-src.tar.gz
            inform6-src.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: [build-compiler, build-vsix, build-source]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten compiler artifacts
        run: |
          for name in inform6-linux-x64 inform6-macos-x64 inform6-macos-arm64 inform6-windows-x64.exe; do
            mv "dist/$name" "dist/_tmp_$name"
            mv "dist/_tmp_$name"/* "dist/$name"
            rmdir "dist/_tmp_$name"
          done
        shell: bash

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "Inform 6 Language Server $TAG" \
            --notes-file .github/RELEASE_NOTES.md \
            dist/inform6-linux-x64 \
            dist/inform6-macos-x64 \
            dist/inform6-macos-arm64 \
            dist/inform6-windows-x64.exe \
            dist/inform6-lsp-vsix/*.vsix \
            dist/inform6-src/inform6-src.tar.gz \
            dist/inform6-src/inform6-src.zip
